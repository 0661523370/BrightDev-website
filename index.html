` GJGHJ<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bright Manzini | Home</title>
  <style>
    /* General Styles */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #111;
      color: #eee;
      overflow-x: hidden;
    }

    /* Header / Hero */
    header {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(#ff0000, #ff5500, #ff0000, #550000);
      animation: rotateBG 15s linear infinite;
      z-index: 0;
      opacity: 0.2;
      border-radius: 50%;
    }

    .hero-title {
      position: relative;
      font-size: 3em;
      font-weight: bold;
      background: linear-gradient(90deg, #ff0000, #ff7777, #ff0000);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px #ff0000, 0 0 20px #ff5555, 0 0 30px #ff0000;
      animation: gradientText 3s ease-in-out infinite;
      z-index: 1;
    }

    .hero-subtitle {
      position: relative;
      font-size: 1.2em;
      margin-top: 15px;
      color: #fff;
      text-shadow: 0 0 10px #ff4444;
      z-index: 1;
    }
    
    .hero-buttons {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      z-index: 1;
    }

    .hero-buttons a {
      padding: 15px 30px;
      border-radius: 50px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      background: linear-gradient(135deg, #ff0000, #ff5555);
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255,0,0,0.5);
    }

    .hero-buttons a:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #ff5555, #ff0000);
      box-shadow: 0 0 20px rgba(255,0,0,0.7);
    }


    nav ul { list-style: none; margin: 0; padding: 0; }
    nav ul li { display: inline-block; margin: 0 20px; }
    nav ul li a { color: #ff5555; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: color 0.3s ease; }
    nav ul li a:hover { color: #fff; }

    /* Sections */
    section {
      padding: 60px 20px;
      margin: 20px auto;
      max-width: 900px;
      background: #222;
      border-radius: 12px;
      box-shadow: 0px 0px 25px rgba(255, 0, 0, 0.4);
      text-align: center;
    }

    section h2 {
      font-size: 2em;
      margin-bottom: 20px;
      color: #ff4444;
      border-left: 5px solid #ff4444;
      padding-left: 12px;
    }


    footer {
      background: #111;
      color: #999;
      text-align: center;
      padding: 25px 10px;
      margin-top: 40px;
      font-size: 0.9em;
      border-top: 1px solid #333;
    }

    /* Animations */
    @keyframes gradientText {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes rotateBG {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>
<body>


  <header>
    <h1 class="hero-title">Bright Manzini</h1>
    <p class="hero-subtitle">Mechanical Engineer | CAD Specialist</p>
    <div class="hero-buttons">
      <a href="Home.html">Home</a>
      <a href="About.html">About</a>
      <a href="project.html">projects</a>
      <a href="skills.html">Skills</a>
         <a href="contacts.html">contacts</a>
      
    </div>
  </header>


  <footer>
    <p>&copy; 2025 Bright Manzini. All Rights Reserved.</p>
  </footer>

</body>
</html>
